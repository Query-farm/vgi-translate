name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['README.md']
  pull_request:
    branches: [main]
    paths-ignore: ['README.md']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      # Runs the full suite. The single real en->es translation test
      # (tests/test_translate.py) downloads an Argos package; it self-skips if
      # the download is unavailable, so CI stays green offline.
      - name: Run tests
        run: uv run pytest -q

  # End-to-end SQL tests: run the worker under DuckDB via the haybarn-unittest
  # sqllogictest runner. The `translate` / `translate_all` / error cases need
  # the Argos en->es package; `ensure_argos_pair.py` installs it and the job
  # tolerates a failed download (it warns and continues). The `detect_lang` E2E
  # case needs no download and always runs. If model downloads in CI prove
  # flaky, this whole job can be gated (e.g. `if: github.event_name ==
  # 'workflow_dispatch'`) without affecting the unit/lint jobs above.
  e2e-sql:
    name: E2E SQL (DuckDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install haybarn-unittest (sqllogictest runner)
        run: uv tool install haybarn-unittest

      - name: Pre-install Argos en->es package
        run: uv run python scripts/ensure_argos_pair.py en es || echo "en->es download failed; real-translation cases will report it"

      - name: Run SQL end-to-end tests
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          make test-sql

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Check linting
        run: uv run ruff check .
